<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Outer cosmic glow ring -->
  <circle cx="150" cy="150" r="145" fill="url(#outerGlow)" opacity="0.25"/>
  <!-- Background circle -->
  <circle cx="150" cy="150" r="135" fill="url(#bgGrad)"/>
  <!-- Mandala dashed ring -->
  <circle cx="150" cy="150" r="128" fill="none" stroke="url(#blueGrad)" stroke-width="1.5" opacity="0.5" stroke-dasharray="8 4"/>
  <!-- Inner field -->
  <circle cx="150" cy="150" r="118" fill="url(#innerBg)"/>
  <!-- Petals (lotus / vastu yantra vibes) -->
  <ellipse cx="150" cy="40" rx="10" ry="18" fill="url(#blueGrad)" opacity="0.45" transform="rotate(0 150 150)"/>
  <ellipse cx="150" cy="40" rx="10" ry="18" fill="url(#blueGrad)" opacity="0.45" transform="rotate(45 150 150)"/>
  <ellipse cx="150" cy="40" rx="10" ry="18" fill="url(#blueGrad)" opacity="0.45" transform="rotate(90 150 150)"/>
  <ellipse cx="150" cy="40" rx="10" ry="18" fill="url(#blueGrad)" opacity="0.45" transform="rotate(135 150 150)"/>
  <ellipse cx="150" cy="40" rx="10" ry="18" fill="url(#blueGrad)" opacity="0.45" transform="rotate(180 150 150)"/>
  <ellipse cx="150" cy="40" rx="10" ry="18" fill="url(#blueGrad)" opacity="0.45" transform="rotate(225 150 150)"/>
  <ellipse cx="150" cy="40" rx="10" ry="18" fill="url(#blueGrad)" opacity="0.45" transform="rotate(270 150 150)"/>
  <ellipse cx="150" cy="40" rx="10" ry="18" fill="url(#blueGrad)" opacity="0.45" transform="rotate(315 150 150)"/>
  <!-- Body / saree -->
  <ellipse cx="150" cy="220" rx="58" ry="45" fill="url(#bodyGrad)"/>
  <ellipse cx="150" cy="228" rx="58" ry="38" fill="url(#sareeGrad)" opacity="0.85"/>
  <!-- Neck -->
  <rect x="141" y="168" width="18" height="22" rx="9" fill="url(#skinGrad)"/>
  <!-- Head -->
  <ellipse cx="150" cy="148" rx="38" ry="42" fill="url(#skinGrad)"/>
  <!-- Hair -->
  <ellipse cx="150" cy="120" rx="38" ry="22" fill="#0A1E3A"/>
  <!-- Hair flow right -->
  <path d="M188 125 Q210 140 205 170 Q195 185 185 188 Q190 165 188 145 Z" fill="#0A1E3A"/>
  <!-- Bun -->
  <ellipse cx="150" cy="108" rx="20" ry="16" fill="#071A30"/>
  <!-- Bindi -->
  <circle cx="150" cy="140" r="3.5" fill="url(#whiteGrad)"/>
  <!-- Eyes -->
  <ellipse cx="138" cy="150" rx="7" ry="5" fill="#0A1E3A"/>
  <ellipse cx="162" cy="150" rx="7" ry="5" fill="#0A1E3A"/>
  <circle cx="139" cy="149" r="2" fill="white" opacity="0.9"/>
  <circle cx="163" cy="149" r="2" fill="white" opacity="0.9"/>
  <!-- Eyebrows -->
  <path d="M130 143 Q138 139 146 143" stroke="#0A1E3A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M154 143 Q162 139 170 143" stroke="#0A1E3A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nose shadow -->
  <path d="M150 153 Q147 159 148 162 Q150 163 152 162 Q153 159 150 153Z" fill="#B8733E" opacity="0.4"/>
  <!-- Smile -->
  <path d="M142 168 Q150 173 158 168" stroke="#42A5F5" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Necklace -->
  <path d="M135 188 Q150 196 165 188" stroke="url(#blueGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="150" cy="194" r="3" fill="url(#blueGrad)"/>
  <!-- Nose ring -->
  <circle cx="155" cy="161" r="2" fill="none" stroke="url(#blueGrad)" stroke-width="1.2"/>
  <!-- Earrings -->
  <circle cx="111" cy="155" r="5" fill="url(#blueGrad)"/>
  <circle cx="189" cy="155" r="5" fill="url(#blueGrad)"/>
  <!-- Decorative stars -->
  <text x="60" y="75" font-size="14" fill="#42A5F5" opacity="0.65" font-family="serif">✦</text>
  <text x="225" y="80" font-size="12" fill="#82CFFF" opacity="0.55" font-family="serif">✧</text>
  <text x="45" y="195" font-size="10" fill="#1E88E5" opacity="0.6" font-family="serif">⬡</text>
  <text x="240" y="200" font-size="10" fill="#1E88E5" opacity="0.6" font-family="serif">⬡</text>
  <!-- Numbers -->
  <text x="72" y="130" font-size="11" fill="#42A5F5" opacity="0.45" font-family="Georgia, serif">9</text>
  <text x="218" y="135" font-size="11" fill="#42A5F5" opacity="0.45" font-family="Georgia, serif">3</text>
  <text x="80" y="220" font-size="10" fill="#1E88E5" opacity="0.45" font-family="Georgia, serif">7</text>
  <text x="212" y="218" font-size="10" fill="#1E88E5" opacity="0.45" font-family="Georgia, serif">1</text>
  <!-- Defs -->
  <defs>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F2E57"/>
      <stop offset="70%" stop-color="#071A30"/>
      <stop offset="100%" stop-color="#020C18"/>
    </radialGradient>
    <radialGradient id="innerBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#143D7A"/>
      <stop offset="100%" stop-color="#0A2040"/>
    </radialGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="50%" stop-color="#82CFFF"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4956A"/>
      <stop offset="100%" stop-color="#B8733E"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#071A30"/>
    </linearGradient>
    <linearGradient id="sareeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="50%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
</svg>
